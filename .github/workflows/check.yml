name: check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      build_host:
        description: "Optionally build a host closure: alison, grace (Linux), or ada (macOS). Empty = skip."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.build_host || 'check' }}
  cancel-in-progress: true

jobs:
  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      # Evaluates every host in flake.nixosConfigurations (including the aarch64
      # GPU node `grace`) plus the treefmt formatter config. Evaluation is the
      # gate: it proves each host is well-formed without building closures.
      - name: Flake check
        run: nix flake check --print-build-logs

  # Opt-in Linux host build (Actions -> Run workflow -> host). `grace` is
  # aarch64, so it builds on a native ARM runner (no emulation). A full CUDA
  # closure is large; a heavy build may exceed a shared runner's disk - point
  # `runs-on` at a self-hosted aarch64 runner for those.
  build-linux:
    name: build ${{ inputs.build_host }} (linux)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_host != '' && inputs.build_host != 'ada' }}
    runs-on: ${{ inputs.build_host == 'grace' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache 2>/dev/null || true
          df -h /

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build ${{ inputs.build_host }} closure
        run: |
          nix build --print-build-logs \
            ".#nixosConfigurations.${{ inputs.build_host }}.config.system.build.toplevel"

  # Opt-in darwin build. Darwin can only build on macOS - never in a Linux
  # container - so `ada` builds on an Apple Silicon macOS runner from the
  # machines/darwin sub-flake.
  build-darwin-ada:
    name: build ada (darwin)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_host == 'ada' }}
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build ada (darwin) system
        working-directory: machines/darwin
        run: |
          nix flake lock
          nix build --print-build-logs '.#darwinConfigurations.ada.system'
